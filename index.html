<!DOCTYPE html>
<html lang="es">
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biblia de Estudio Avanzada</title>
    <meta name="theme-color" content="#2c3e50">
    <meta name="description" content="Aprende la Biblia, crea estudios, filtros y puntos de vista. PWA Offline-First.">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon.svg">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1 id="app-title" style="cursor: pointer; user-select: none;">📖 Biblia de Estudio</h1>
        <div class="badges">
            <span id="offline-badge" class="badge">Offline</span>
            <button id="install-btn"
                style="display:none; background: var(--secondary); border:none; color:white; padding:4px 12px; border-radius:15px; cursor:pointer; font-weight:bold; font-size:0.8rem;">Instalar</button>
        </div>
    </header>

    <main>
        <aside id="main-sidebar">
            <div class="sidebar-tabs">
                <button id="tab-books" class="active">📚 Biblia</button>
                <button id="tab-persp" title="Temas y Búsquedas">👁️ Temas</button>
                <button id="tab-sessions" title="Agendas y Sesiones">📅 Sesiones</button>
                <button id="tab-filters" style="display:none;">🔍 Filtros</button>
            </div>

            <div class="import-group" style="display: flex; flex-direction: row; justify-content: center; padding: 10px 0; gap: 20px; border-top: 1px solid #ccc; margin-top: 10px;">
                <button id="btn-import-study" title="Importar Mis Notas" style="background: transparent; border: none; font-size: 1.5rem; cursor: pointer; padding: 5px; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">📁</button>
                <button id="btn-export-unified" title="Exportar Todo" style="background: transparent; border: none; font-size: 1.5rem; cursor: pointer; padding: 5px; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">💾</button>
                <button id="btn-clear-db" title="Borrar Todo" style="background: transparent; border: none; font-size: 1.5rem; cursor: pointer; padding: 5px; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">🗑️</button>
                <button id="btn-import" title="Cargar Otra Biblia" style="background: transparent; border: none; font-size: 1.5rem; cursor: pointer; padding: 5px; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">📤</button>
                <input type="file" id="file-import" accept=".json" style="display: none;">
                <input type="file" id="file-import-study" accept=".json" style="display: none;">
            </div>

            <div id="sidebar-content"></div>
        </aside>

        <section class="content">
            <div id="scrollable-content">
                <div class="content-header">
                    <button class="btn-back" id="btn-back" style="display: none;">⬅️ Regresar</button>
                </div>

                <div id="main-view-container">
                    <!-- Dinámico -->
                </div>

                <div id="global-editor" class="global-editor" style="display: none;">
                    <button id="btn-toggle-editor"
                        style="width:100%; padding:10px; border:1px dashed var(--primary); border-radius:8px; background:none; cursor:pointer; font-weight:bold; color:var(--primary);">➕
                        Gestionar Mis Notas Personales</button>
                    <div id="editor-container" class="editor-container" style="display: none;">
                        <input type="text" id="new-persp-name" placeholder="Título (Ej: Mi Resumen)">
                        <input type="text" id="new-persp-tags" placeholder="Etiquetas (separadas por coma)">
                        <textarea id="new-persp-text" rows="3"
                            placeholder="Escribe tu análisis personal aquí..."></textarea>
                        <button id="btn-save-note" class="btn-save-note">💾 Guardar en Mis Notas</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="progress-toast" class="progress-toast"></div>

    <script src="js/state.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/importExport.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito:', reg.scope))
                    .catch(err => console.error('Error al registrar Service Worker:', err));
            });
        }
    </script>
</body>

</html>
